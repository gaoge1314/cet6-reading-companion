<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>六级阅读突击手</title>
  <link rel="stylesheet" href="assets/css/theme.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/longread.css">
  <link rel="stylesheet" href="assets/css/cloze.css">
  <link rel="stylesheet" href="assets/css/vocab.css">
  <style>
    .home-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px;
    }
    .home-stats-bar {
      padding: 16px 20px;
      margin-bottom: 16px;
    }
    .stats-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text1);
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .stat-item {
      text-align: center;
      padding: 8px;
      background: var(--bg2);
      border-radius: 6px;
    }
    .stat-num {
      font-size: 24px;
      font-weight: 700;
      color: var(--primary);
    }
    .stat-label {
      font-size: 12px;
      color: var(--text3);
      margin-top: 4px;
    }
    .home-section {
      margin-bottom: 24px;
    }
    .section-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text1);
    }
    .exam-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }
    .exam-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      background: var(--bg1);
      cursor: pointer;
      transition: all 0.2s;
    }
    .exam-card:hover {
      border-color: var(--primary);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .exam-card.import-card {
      border: 2px dashed var(--border);
      background: var(--bg2);
    }
    .exam-card.import-card:hover {
      border-color: var(--primary);
      background: var(--bg1);
    }
    .exam-card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text1);
      margin-bottom: 6px;
    }
    .exam-card-meta {
      font-size: 13px;
      color: var(--text3);
      margin-bottom: 10px;
    }
    .exam-card-modules {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .module-tag {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--bg2);
      color: var(--text2);
    }
    .module-tag.reading {
      background: #e3f2fd;
      color: #1976d2;
    }
    .module-tag.matching {
      background: #e8f5e9;
      color: #388e3c;
    }
    .module-tag.cloze {
      background: #fff3e0;
      color: #f57c00;
    }
    .home-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text3);
    }
    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .empty-title {
      font-size: 20px;
      margin-bottom: 8px;
      color: var(--text2);
    }
    .empty-desc {
      margin-bottom: 24px;
    }
    .quick-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .quick-btn {
      flex: 1;
      min-width: 140px;
      padding: 16px;
      font-size: 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg1);
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text1);
    }
    .quick-btn:hover:not(:disabled) {
      border-color: var(--primary);
      background: var(--primary);
      color: white;
    }
    .quick-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .import-page {
      max-width: 800px;
      margin: 0 auto;
      padding: 16px;
    }
    .import-content {
      margin-top: 12px;
    }
    .import-section {
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .import-section.collapsed .section-body {
      display: none;
    }
    .section-header {
      padding: 14px 16px;
      background: var(--bg2);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .section-header:hover {
      background: var(--bg3);
    }
    .section-header .section-title {
      margin: 0;
      font-weight: 600;
    }
    .toggle-icon {
      font-size: 13px;
      color: var(--text3);
    }
    .section-body {
      padding: 16px;
    }
    .form-row {
      display: flex;
      gap: 16px;
    }
    .form-group {
      flex: 1;
      margin-bottom: 16px;
    }
    .form-row .form-group {
      margin-bottom: 0;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 6px;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg1);
      color: var(--text1);
      font-size: 14px;
      box-sizing: border-box;
    }
    .form-group textarea {
      min-height: 100px;
      resize: vertical;
      font-family: monospace;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
    }
    .processing-page {
      max-width: 500px;
      margin: 60px auto;
      padding: 16px;
    }
    .processing-card {
      padding: 24px;
      text-align: center;
    }
    .processing-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text1);
    }
    .progress-bar {
      height: 16px;
      background: var(--bg2);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .progress-bar .ok {
      height: 100%;
      background: var(--primary);
      transition: width 0.3s;
      border-radius: 8px;
    }
    .processing-steps {
      text-align: left;
    }
    .processing-step {
      padding: 6px 0;
      font-size: 14px;
      color: var(--text3);
    }
    .processing-step.done {
      color: var(--text1);
    }
    .exam-detail {
      max-width: 800px;
      margin: 0 auto;
      padding: 16px;
    }
    .exam-detail-content {
      margin-top: 12px;
    }
    .exam-modules {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }
    .module-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      background: var(--bg1);
      cursor: pointer;
      transition: all 0.2s;
    }
    .module-card:hover {
      border-color: var(--primary);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .module-card.reading {
      border-left: 4px solid #1976d2;
    }
    .module-card.matching {
      border-left: 4px solid #388e3c;
    }
    .module-card.cloze {
      border-left: 4px solid #f57c00;
    }
    .module-card-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text1);
      margin-bottom: 8px;
    }
    .module-card-status {
      font-size: 13px;
      color: var(--text3);
    }
  </style>
</head>
<body>
  <div id="app-root"></div>
  <script src="assets/js/cet6-utils.js"></script>
  <script src="assets/js/cet6-vocab.js"></script>
  <script src="assets/js/cet6-annotate.js"></script>
  <script src="assets/js/cet6-locateword.js"></script>
  <script src="assets/js/cet6-loader.js"></script>
  <script src="assets/js/cet6-import-parser.js"></script>
  <script src="assets/js/cet6-data-migrator.js"></script>
  <script src="assets/js/cet6-progress-store.js"></script>
  <script src="assets/js/cet6-engine.js"></script>
  <script src="assets/js/cet6-longread-engine.js"></script>
  <script src="assets/js/cet6-cloze-engine.js"></script>
  <script src="assets/js/cet6-vocab-engine.js"></script>
  <script src="assets/js/cet6-shell.js"></script>
  <script src="assets/js/app-controller.js"></script>
</body>
</html>
