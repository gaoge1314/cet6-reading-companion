<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>长篇阅读 · 匹配题 · 实战陪练</title>
<link rel="stylesheet" href="assets/css/theme.css">
<link rel="stylesheet" href="assets/css/layout.css">
<link rel="stylesheet" href="assets/css/longread.css">
</head>
<body>

<div class="header">
  <div>
    <h1 id="page-title">长篇阅读突击手</h1>
    <div class="meta" id="page-meta">加载中...</div>
  </div>
  <div class="header-actions">
    <span id="vocab-header-count" style="font-size:13px;color:var(--accent);font-weight:600;">0 词</span>
    <button class="btn" onclick="window._vocab.exportMarkdown('生词本')">导出 .md</button>
    <button class="btn btn-danger" onclick="window._vocab.clear()">清空生词本</button>
    <button class="btn" onclick="window.location.href='index.html'">← 返回</button>
  </div>
</div>

<div class="timer-bar" id="timer-bar" style="display:none;">
  <span class="timer-main" id="timer-display">15:00</span>
  <div class="timer-info">
    <span id="timer-info-text">总时长 15分钟 · 每题不超过 60秒 · 目标 7-8 道</span>
    <span style="margin-left:12px;font-size:11px;color:var(--text3);" id="timer-segments"></span>
  </div>
  <div class="timer-actions">
    <button class="btn" onclick="window._engine.stopTimer()" id="btn-stop-timer">停止计时</button>
    <button class="btn" onclick="window._engine.startTimer()" id="btn-start-timer" style="display:none;">继续计时</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-phase="1" onclick="window._engine.switchPhase('1')">Phase 1 <span class="badge">选项扫读</span></div>
  <div class="tab" data-phase="2" onclick="window._engine.switchPhase('2')">Phase 2 <span class="badge">计时定位</span></div>
  <div class="tab" data-phase="3" onclick="window._engine.switchPhase('3')">Phase 3 <span class="badge">对答案</span></div>
  <div class="tab" data-phase="4" onclick="window._engine.switchPhase('4')">Phase 4 <span class="badge">复盘</span></div>
</div>

<div class="main">
  <div class="content" id="main-content">
    <div style="text-align:center;padding:60px;color:var(--text2);">加载数据中...</div>
  </div>

  <div class="sidebar">
    <div class="vocab-panel">
      <div class="title">
        <span>生词本</span>
        <span class="count">已选: <span id="vocab-count">0</span> 词</span>
      </div>
      <div class="vocab-list" id="vocab-list">
        <div class="vocab-empty">选中任意单词 → 弹出"加入生词本"</div>
      </div>
    </div>

    <div class="annotate-panel">
      <div class="title">
        <span>划线标注</span>
        <span class="count"><span id="annotate-count">0</span> 处</span>
      </div>
      <div class="annotate-list" id="annotate-list">
        <div class="annotate-empty">选中文字 → 点击"划线标注"</div>
      </div>
    </div>

    <div class="locateword-panel">
      <div class="title">
        <span>📍 定位词</span>
        <span class="count"><span id="locateword-count">0</span> 个</span>
      </div>
      <div class="locateword-list" id="locateword-list">
        <div class="locateword-empty">选中单词 → 点击"标记为定位词"</div>
      </div>
    </div>

    <div class="summary-panel">
      <div class="title">匹配状态</div>
      <div id="match-status-card">
        <div style="font-size:12px;color:var(--text2);text-align:center;padding:12px;">切换到 Phase 2 开始匹配</div>
      </div>
    </div>

    <div style="font-size:11px;color:var(--text3);text-align:center;padding:8px;">
      选中文章中的单词/短语 → 弹出操作菜单
    </div>
  </div>
</div>

<div id="word-popup">
  <div class="selected-text"><span id="popup-word"></span></div>
  <input class="popup-input" id="popup-annotation" placeholder="标注备注（可选）..." maxlength="30">
  <div class="btn-group">
    <button class="btn-add" onclick="addFromVocab()">加入生词本</button>
    <button class="btn-annotate" onclick="addAnnotation()">划线 + 标注</button>
  </div>
  <div class="btn-row">
    <button class="btn-underline" onclick="addUnderlineOnly()">仅划线</button>
    <button class="btn-locateword" onclick="addAsLocateWord()">🖍 定位词</button>
    <button class="btn-cancel" onclick="hidePopup()">取消</button>
  </div>
  <div class="popup-hint">划线后文字下方会出现橙色标记 · 定位词以黄色高亮显示</div>
</div>

<script src="assets/js/cet6-loader.js"></script>
<script src="assets/js/cet6-vocab.js"></script>
<script src="assets/js/cet6-annotate.js"></script>
<script src="assets/js/cet6-locateword.js"></script>
<script src="assets/js/cet6-longread-engine.js"></script>

<script>
let selectedText = '';
let selectedPara = 0;

function addFromVocab() {
  if (!selectedText) return;
  const activeTab = document.querySelector('.tab.active');
  let source = '';
  if (activeTab) source = 'Phase ' + activeTab.dataset.phase;
  window._vocab.add(selectedText, source);
  window._engine._renderVocabPanel();
  const hCount = document.getElementById('vocab-header-count');
  if (hCount) hCount.textContent = window._vocab.count() + ' 词';
  hidePopup();
}

function addAnnotation() {
  if (!selectedText) return;
  const note = document.getElementById('popup-annotation').value.trim();
  window._annotate.add(selectedText, selectedPara, note);
  window._engine.reRenderCurrentPhase();
  window._engine._renderAnnotatePanel();
  hidePopup();
}

function addUnderlineOnly() {
  if (!selectedText) return;
  window._annotate.add(selectedText, selectedPara, '');
  window._engine.reRenderCurrentPhase();
  window._engine._renderAnnotatePanel();
  hidePopup();
}

function addAsLocateWord() {
  if (!selectedText) return;
  const activeTab = document.querySelector('.tab.active');
  if (!activeTab || activeTab.dataset.phase !== '2') {
    alert('请在 Phase 2 中标记定位词');
    return;
  }
  const focusedOpt = window._engine.currentFocus;
  if (!focusedOpt) {
    alert('请先点击一个选项卡片聚焦，再标记定位词');
    return;
  }
  window._engine.addLocateWord(focusedOpt, selectedText);
  hidePopup();
}

function hidePopup() {
  document.getElementById('word-popup').style.display = 'none';
  document.getElementById('popup-annotation').value = '';
  selectedText = '';
  selectedPara = 0;
}

function findClosestPara(element) {
  while (element && element.nodeType !== Node.ELEMENT_NODE) {
    element = element.parentElement;
  }
  while (element) {
    if (element.hasAttribute('data-para')) {
      return parseInt(element.getAttribute('data-para').charCodeAt(0) - 65);
    }
    element = element.parentElement;
  }
  return 0;
}

function updateMatchStatusCard() {
  const card = document.getElementById('match-status-card');
  if (!card || !window._engine) return;
  const total = (window._engine.data.options || []).length;
  const done = window._engine.data.options ? window._engine.data.options.filter(o =>
    window._engine.matches[o.id] !== undefined || window._engine.gaveUps.has(o.id)
  ).length : 0;
  const gaveUp = window._engine.gaveUps.size;
  card.innerHTML = `
    <div style="font-size:13px;text-align:center;padding:8px;">
      <div style="font-size:24px;font-weight:700;color:var(--accent);">${done}/${total}</div>
      <div style="font-size:11px;color:var(--text2);">已匹配 · 放弃 ${gaveUp} 题</div>
      <div style="margin-top:4px;font-size:10px;color:var(--text3);">目标 7-8 道</div>
    </div>`;
}

(function () {
  const params = new URLSearchParams(window.location.search);
  const dataId = params.get('data') || 'longread-template';
  const dataPath = 'assets/data/' + dataId + '.json';

  const vocab = new CET6Vocab('cet6-longread-vocab-' + dataId, { disableListener: true });
  window._vocab = vocab;

  vocab.onChange = function () {
    if (window._engine) {
      window._engine._renderVocabPanel();
      const hCount = document.getElementById('vocab-header-count');
      if (hCount) hCount.textContent = vocab.count() + ' 词';
    }
  };

  try {
    CET6Loader.load(dataPath).then(data => {
      document.getElementById('page-title').textContent = '长篇阅读突击手';
      document.getElementById('page-meta').textContent = data.meta.description || data.meta.title;

      const recent = JSON.parse(localStorage.getItem('cet6-recent') || '[]');
      const existing = recent.findIndex(r => r.id === dataId);
      const entry = {
        id: dataId,
        title: data.meta.title,
        desc: data.meta.description,
        time: new Date().toLocaleString(),
        score: ''
      };
      if (existing >= 0) recent[existing] = entry;
      else { recent.unshift(entry); if (recent.length > 5) recent.pop(); }
      localStorage.setItem('cet6-recent', JSON.stringify(recent));

      const annotate = new CET6Annotate('cet6-longread-annotations-' + dataId);
      window._annotate = annotate;

      annotate.onChange = function () {
        if (window._engine) {
          window._engine._renderAnnotatePanel();
          window._engine.reRenderCurrentPhase();
        }
      };

      const locateWord = new CET6LocateWord('cet6-longread-locatewords-' + dataId);
      window._locateWord = locateWord;

      locateWord.onChange = function () {
        if (window._engine) {
          window._engine._renderLocateWordPanel();
        }
      };

      const engine = new CET6LongReadEngine(data, vocab, locateWord);
      engine.setAnnotate(annotate);
      window._engine = engine;

      const contentEl = document.getElementById('main-content');
      const timerEl = document.getElementById('timer-display');
      engine.init(null, contentEl, timerEl);

      const hCount = document.getElementById('vocab-header-count');
      if (hCount) hCount.textContent = vocab.count() + ' 词';

      const origSelect = engine.selectPara.bind(engine);
      engine.selectPara = function(optId, paraId) {
        origSelect(optId, paraId);
        updateMatchStatusCard();
      };
      const origGiveUp = engine.toggleGiveUp.bind(engine);
      engine.toggleGiveUp = function(optId) {
        origGiveUp(optId);
        updateMatchStatusCard();
      };

      document.getElementById('btn-stop-timer').onclick = function() {
        engine.stopTimer();
        this.style.display = 'none';
        document.getElementById('btn-start-timer').style.display = '';
      };
      document.getElementById('btn-start-timer').onclick = function() {
        engine.startTimer();
        this.style.display = 'none';
        document.getElementById('btn-stop-timer').style.display = '';
      };

    }).catch(e => {
      document.getElementById('main-content').innerHTML =
        '<div style="text-align:center;padding:60px;color:var(--error);">' +
        '<h2>加载失败</h2>' +
        '<p>' + dataPath + '</p>' +
        '<p style="font-size:13px;color:var(--text2);">' + e.message + '</p>' +
        '<button class="btn btn-accent" style="margin-top:20px;" onclick="window.location.href=\'index.html\'">返回选题</button>' +
        '</div>';
      console.error(e);
    });
  } catch (e) {
    document.getElementById('main-content').innerHTML =
      '<div style="text-align:center;padding:60px;color:var(--error);">' +
      '<h2>初始化失败</h2>' +
      '<p>' + e.message + '</p>' +
      '<button class="btn btn-accent" style="margin-top:20px;" onclick="window.location.href=\'index.html\'">返回选题</button>' +
      '</div>';
  }
})();

document.addEventListener('mouseup', function (e) {
  if (e.target.closest && e.target.closest('#word-popup')) return;

  var sel = window.getSelection();
  var text = sel.toString().trim();

  if (!text) return;
  if (text.split(/\s+/).length > 8) return;
  if (text.length > 80) return;

  var paraIdx = 0;
  try {
    if (sel.rangeCount > 0) {
      var range = sel.getRangeAt(0);
      paraIdx = findClosestPara(range.startContainer);
    }
  } catch (err) {}

  selectedText = text;
  selectedPara = paraIdx;

  var popup = document.getElementById('word-popup');
  popup.style.display = 'block';
  document.getElementById('popup-word').textContent = text;
  document.getElementById('popup-annotation').value = '';

  try {
    if (sel.rangeCount > 0) {
      var rect = sel.getRangeAt(0).getBoundingClientRect();
      popup.style.left = Math.max(10, Math.min(rect.left, window.innerWidth - 280)) + 'px';
      popup.style.top = (rect.bottom + 10) + 'px';
    }
  } catch (err) {
    popup.style.left = Math.max(10, e.clientX) + 'px';
    popup.style.top = (e.clientY + 20) + 'px';
  }
});

document.addEventListener('mousedown', function (e) {
  var popup = document.getElementById('word-popup');
  if (!popup || popup.style.display !== 'block') return;
  if (popup.contains(e.target)) return;
  popup.style.display = 'none';
  window.getSelection().removeAllRanges();
});
</script>

</body>
</html>
